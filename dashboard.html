<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bank Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #f4f7fb;
    --card: #ffffff;
    --text: #222;
    --primary: linear-gradient(135deg, #667eea, #764ba2);
    --secondary: linear-gradient(135deg, #43cea2, #185a9d);
}

.dark {
    --bg: #121212;
    --card: #1e1e1e;
    --text: #f5f5f5;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

/* Glass Card */
.login-card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    color: #fff;
}

/* Title */
.login-card h2 {
    margin-bottom: 25px;
}

/* Input */
.login-card input {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    margin-bottom: 15px;
    outline: none;
}

/* Button */
.login-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: #fff;
    color: #667eea;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    transform: scale(1.05);
}

.create-btn {
    display: block;
    margin-top: 15px;
    padding: 10px;
    border-radius: 30px;
    background: transparent;
    border: 1px solid #fff;
    color: #fff;
    text-decoration: none;
    transition: 0.3s;
}

body {
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

.toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--secondary);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 30px;
    cursor: pointer;
}

/* ---------- Layout ---------- */
.container {
    max-width: 1100px;
    margin: 80px auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 40px;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.card {
    background: var(--card);
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

.card h3 {
    margin-bottom: 15px;
}

/* ---------- Inputs ---------- */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
}

input:focus {
    outline: none;
    border-color: #667eea;
}

/* ---------- Buttons ---------- */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 30px;
    background: var(--primary);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

/* ---------- Footer ---------- */
footer {
    margin-top: 60px;
    padding: 20px;
    text-align: center;
    background: #000;
    color: #fff;
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleTheme()">🌙 Toggle</button>

<div class="container">
    <h1>Bank Account Dashboard</h1>
	<h1>If you dont have acoount please first create the account </h1>
	<form action="createAccount" method="post">
				     <button type="submit">Create New Account</button>
				 </form>

    <div class="cards">

        <!-- Deposit -->
        <div class="card">
            <h3>Deposit Money</h3>
            <form action="Deposite">
                 <input type="number" name="num" placeholder="Enter Account Number" required>
                <input type="number" name="amount" placeholder="Enter amount" required>
                <button type="submit">Deposit</button>
            </form>
        </div>
		
		

		      <!-- Transfer -->
		      <div class="card">
		          <h3>Transfer</h3>
		          <form action="/testTransfer">
		               <input type="number" name="from" placeholder="Enter your Account number" required>
		              <input type="number" name="to" placeholder="Enter the reciever account number" required>
					  <input type="number" name="amount" placeholder="Enter the amoount" required>
		              <button type="submit">Transfer</button>
		          </form>
		      </div>

        <!-- Withdraw -->
        <div class="card">
            <h3>Withdraw Money</h3>
            <form action="Widthraw" >
                <input type="number" name="num" placeholder="Enter Account Number" required>
                <input type="number" name="amount" placeholder="Enter amount" required>
                <button type="submit">Withdraw</button>
            </form>
        </div>

        <!-- Balance -->
        <div class="card">
            <h3>Check Balance</h3>
            <form action="BankBalance">
                <input type="number" name="num" placeholder="Enter Account Number" required>
                <button type="submit">View Balance</button>
            </form>
        </div>

         <!--Rename--> 
        <div class="card">
            <h3>Change Account Holder Name</h3>
            <form action="nameChange" >
                <input type="number" name="num" placeholder="Enter Account Number" required>
                <input type="text" name="Nname" placeholder=" Enter New name" required>
                <button type="submit">Update Name</button>
            </form>
        </div>
         
        <!--show details-->
        <div class="card">
            <h3>Account Holder Details</h3>
            <form action="Details" >
            <input type="number" name="accno" placeholder="Enter Account Number" required>
            
            <button type="submit">Details </button>
			
             </form>  
			 <br>
			 <br> 
			 
			 <form action="/logout" method="post">
			     <button type="submit">Logout</button>
			 </form>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 Online Banking System | Java SpringBoot Project | Created By Naeem Shaikh</p>
</footer>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
